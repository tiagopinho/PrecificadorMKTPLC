<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <!-- <link rel="manifest" href="manifest.webmanifest"> -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <title>Precificador Markup</title>
  <style>
    :root{
      color-scheme: dark;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      --label-size: 15px;
      --input-size: 16px;
      --input-pad: 10px;
      --input-width: 100%;
      
      /* Tema escuro (padrão) */
      --bg-body: #000000;
      --bg-card: #1a1a1a;
      --border-color: #333333;
      --text-color: #ffffff;
      --text-muted: #888888;
      --input-bg: #2a2a2a;
      --input-border: #404040;
      --accent-green: #00ff88;
      --accent-red: #ff3b30;
    }
    
    /* Tema claro */
    body.light-mode {
      color-scheme: light;
      --bg-body: #f5f5f5;
      --bg-card: #ffffff;
      --border-color: #e0e0e0;
      --text-color: #000000;
      --text-muted: #666666;
      --input-bg: #f0f0f0;
      --input-border: #d0d0d0;
      --accent-green: #00aa00;
      --accent-red: #ff3b30;
    }
    
    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .header-container h1 {
      margin: 0;
      flex: 1;
    }
    
    .theme-toggle-btn {
      padding: 8px 16px;
      border: 1px solid var(--input-border);
      background-color: var(--input-bg);
      color: var(--text-color);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    
    .theme-toggle-btn:hover {
      background-color: var(--border-color);
    }
    
    html, body{ 
      margin:0; padding:0; 
      background-color: var(--bg-body);
      color: var(--text-color);
    }
    body{ padding:12px; -webkit-text-size-adjust:100%; }
    h1{ margin:0 0 16px 0; font-size:1.4rem; color: var(--text-color); }
    
    .card{
      background-color: var(--bg-card);
      border:1px solid var(--border-color);
      border-radius:12px; 
      padding:14px; 
      margin-bottom:12px;
    }

    .row{
      display:grid; grid-template-columns: 1fr 90px;
      gap:10px; align-items:center; margin:8px 0;
    }

    .row-big-result{
        display:grid; 
        grid-template-columns: 1fr 140px; 
        gap:10px; 
        align-items:center; 
        margin:8px 0;
    }

    .rowpct{
      display:grid; grid-template-columns: 1fr 70px 90px;
      gap:10px; align-items:center; margin:8px 0;
    }
    .result-right{ 
      text-align:right; 
      font-weight:600; 
      color: var(--text-color);
      font-size: 14px;
    }

    .row4{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:10px;
      align-items:center;
      margin:8px 0;
    }

    .row4.product-label {
      grid-template-columns: 1fr 1fr 1fr;
      margin-bottom: 2px;
      font-weight: 600;
      font-size: 13px;
      color: var(--text-muted);
    }

    .row4.product-inputs {
      grid-template-columns: 1fr 1fr 1fr;
      margin-bottom: 12px;
    }

    .row4.with-peso {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .row4 > label{
      font-weight:600; 
      font-size:var(--label-size);
      white-space:nowrap; 
      overflow:hidden; 
      text-overflow:ellipsis;
      color: var(--text-color);
    }
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent-green);
    }

    input[type="number"], input[type="text"]{
      padding:var(--input-pad);
      border-radius:8px;
      border:1px solid var(--input-border);
      background-color: var(--input-bg);
      color: var(--text-color);
      font-size:var(--input-size);
      -webkit-appearance:none; 
      appearance:none;
      width:var(--input-width);
      box-sizing:border-box;
    }
    
    input[type="number"]:focus, input[type="text"]:focus {
      outline: none;
      border-color: #666;
    }
    
    input::placeholder {
      color: var(--text-muted);
    }

    select {
      padding: var(--input-pad);
      border-radius: 8px;
      border: 1px solid var(--input-border);
      background-color: var(--input-bg);
      color: var(--text-color);
      font-size: var(--input-size);
      -webkit-appearance: none;
      appearance: none;
      width: var(--input-width);
      box-sizing: border-box;
      cursor: pointer;
    }

    select:focus {
      outline: none;
      border-color: #666;
    }
    
    .row4 input.money{ width:100%; }
    .row4 input.qty  { width:100%; }
    .row4 input.peso { width:100%; }

    .muted{ color: var(--text-muted); font-size:.9rem; }
    .result{ 
      font-weight:700; 
      font-size:1.15rem; 
      color: var(--text-color);
    }
    .result-big{
      font-weight:700; 
      font-size:1.5rem; 
      color: var(--accent-green);
      text-align:right; 
      overflow-wrap: break-word; 
      word-wrap: break-word; 
    }
    .warn{ color:#ff6b35; }
    .toggle{ 
      display:flex; 
      align-items:center; 
      gap:8px; 
      margin-bottom: 12px;
    }
    
    .toggle label {
      color: var(--text-color);
      font-size: 15px;
    }
    
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent-green);
    }

    .compact-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-color);
    }
    
    .reset-button {
      background-color: var(--accent-red);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 15px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: block;
      width: 100%;
      margin-top: 12px;
      transition: background-color 0.2s ease;
    }
    .reset-button:active {
      background-color: #cc2e24;
    }
    .reset-discount {
    background: var(--accent-red);
    color: white;
    border: none;
    border-radius: 6px;
    width: 28px;
    height: 28px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    }
.reset-discount:active {
  background: #cc2e24;
}
.rowpct {
  grid-template-columns: 1fr 90px 32px !important;
}
/* Estilos para tabelas de faixas */
.faixa-table {
  width: 100%;
  border-collapse: collapse;
  margin: 15px 0;
  font-size: 13px;
}

.faixa-table thead {
  background: #2a3a4a;
  color: white;
}

.faixa-table th {
  padding: 10px;
  text-align: left;
  font-weight: 600;
}

.faixa-table td {
  padding: 8px 10px;
  border-bottom: 1px solid #333;
}

.faixa-table input {
  width: 100%;
  padding: 6px;
  background: #2a2a2a;
  border: 1px solid #404040;
  color: white;
  border-radius: 4px;
}

.faixa-table button {
  padding: 4px 8px;
  background: #ff3b30;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
}

.faixa-table button:active {
  background: #cc2e24;
}

.add-faixa-btn {
  background: #00ff88;
  color: #000;
  border: none;
  border-radius: 6px;
  padding: 8px 12px;
  cursor: pointer;
  font-weight: 600;
  margin: 10px 0;
}

.add-faixa-btn:active {
  opacity: 0.8;
}

.info-box {
  background: rgba(100, 150, 200, 0.2);
  border-left: 3px solid #64a8d8;
  padding: 10px;
  margin: 10px 0;
  border-radius: 4px;
  font-size: 12px;
  color: var(--text-muted);
}
    @media (max-width:360px){
      .row4{
        grid-template-columns:
          minmax(110px,1fr) 6px 70px 6px max-content 6px 55px;
      }
      .row4 input.money{ width:70px; }
      .row4 input.qty  { width:55px; }

      .rowpct{ grid-template-columns: 1fr 66px 85px; }
      .row-big-result{ grid-template-columns: 1fr 120px; } 
    }
  </style>
</head>
<body>
  <div class="header-container">
    <h1>Precificador Markup</h1>
    <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()" title="Alternar tema">🌙 Dark Mode</button>
  </div>

  <div class="card">
    <div class="rowpct">
      <label class="compact-label">MARKETPLACE</label>
      <select id="marketplaceSelect" style="grid-column: 2 / 4; padding: 10px; border-radius: 8px; border: 1px solid var(--input-border); background-color: var(--input-bg); color: var(--text-color); font-size: 16px;">
        <option value="">Uso Genérico</option>
        <option value="shopee">Shopee</option>
        <option value="mercadolivre">Mercado Livre</option>
      </select>
    </div>
    <div id="marketplaceConfigBtn" style="display: none; margin-top: 10px;">
      <button onclick="toggleMarketplaceConfig()" style="width: 100%; padding: 10px; background: #2a4a6a; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">⚙️ Configurar Faixas de Preço</button>
    </div>
    <div id="marketplaceConfig" style="display: none; margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px;">
      <!-- Configuração de faixas será inserida aqui -->
    </div>
  </div>

  <div class="rowpct">
  	<label class="compact-label">DESCONTO NO CUSTO (%)</label>
 	<input type="number" inputmode="decimal" step="0.01" id="discount" placeholder="%" value="50">
 	<button class="reset-discount" onclick="clearDiscount()" title="Limpar desconto">✕</button>
  </div>

  <div class="card">
    <!-- Campos de dimensão para Mercado Livre (peso cúbico) -->
    <div id="dimensoes-container" style="display: none; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color);">
      <div style="display: flex; gap: 10px; margin-bottom: 12px;">
        <label style="font-weight: 600; color: var(--text-color); font-size: 14px;">Dimensões da Caixa (peso cúbico)</label>
      </div>
      <div class="row4">
        <input type="number" inputmode="decimal" step="0.01" id="ml-altura" placeholder="Altura (cm)" value="0">
        <input type="number" inputmode="decimal" step="0.01" id="ml-largura" placeholder="Largura (cm)" value="0">
        <input type="number" inputmode="decimal" step="0.01" id="ml-comprimento" placeholder="Comprimento (cm)" value="0">
      </div>
      <div style="display: flex; gap: 10px; margin-top: 8px; padding: 8px; background-color: var(--input-bg); border-radius: 6px; font-size: 13px;">
        <span style="color: var(--text-muted);">Peso Real: <strong id="ml-peso-real" style="color: var(--text-color);">0 kg</strong></span>
        <span style="color: var(--text-muted);">| Peso Cúbico: <strong id="ml-peso-cubico" style="color: var(--accent-green);">0 kg</strong></span>
        <span style="color: var(--text-muted);">| Usado: <strong id="ml-peso-usado" style="color: var(--accent-green);">0 kg</strong></span>
      </div>
    </div>
    
    <div id="items"></div>

    <div class="row">
      <label>TOTAL DE CUSTO</label>
      <div id="b7" class="result">R$ 0,00</div>
    </div>
    
    <button class="reset-button" onclick="resetProducts()">Zerar Produtos</button>
  </div>

  <div class="card">
    <div class="rowpct">
      <label class="compact-label">MARGEM LUCRO (%)</label>
      <input type="number" inputmode="decimal" step="0.01" id="b8" placeholder="%">
      <div id="r_b8" class="result-right">R$ 0,00</div>
    </div>
    <div class="rowpct" id="tax-fixo-wrapper">
      <label class="compact-label">CUSTO FIXO / FRETE (R$)</label>
      <input type="number" inputmode="decimal" step="0.01" id="b9" placeholder="R$">
      <div></div>
    </div>
    <div class="rowpct">
      <label class="compact-label">EMBALAGEM (R$)</label>
      <input type="number" inputmode="decimal" step="0.01" id="b9b" placeholder="R$">
      <div></div>
    </div>
    <div class="rowpct">
      <label class="compact-label">IMPOSTO (%)</label>
      <input type="number" inputmode="decimal" step="0.01" id="b10" placeholder="%">
      <div id="r_b10" class="result-right">R$ 0,00</div>
    </div>
    <div class="rowpct">
      <label class="compact-label">TAXA EXTRA (%)</label>
      <input type="number" inputmode="decimal" step="0.01" id="b11" placeholder="%">
      <div id="r_b11" class="result-right">R$ 0,00</div>
    </div>
    <div class="rowpct" id="tax-comissao-wrapper">
      <label class="compact-label">COMISSÃO (%)</label>
      <input type="number" inputmode="decimal" step="0.01" id="b12" placeholder="%">
      <div id="r_b12" class="result-right">R$ 0,00</div>
    </div>
    
    <button class="reset-button" onclick="resetTaxes()">Zerar Taxas</button>
  </div>

  <div class="card">
    <div id="warn" class="warn muted" style="display:none;">⚠️ A soma dos percentuais (lucro + impostos + fixo + comissão) precisa ser menor que 100%.</div>
    <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
      <label style="flex: 1;">VALOR ANÚNCIO</label>
      <input type="number" inputmode="decimal" step="0.01" id="b13" placeholder="0,00" style="flex: 1; max-width: 140px; padding: 10px; border-radius: 8px; border: 1px solid var(--input-border); background-color: var(--input-bg); color: var(--accent-green); font-size: 16px; font-weight: 700; text-align: right;">
    </div>
  </div>

  <script>
    const brl = v => v.toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
    const val = id => parseFloat(String(document.getElementById(id).value).replace(',', '.')) || 0;
    const pct = id => { const raw = val(id); return (!isFinite(raw) ? 0 : (raw >= 1 ? raw/100 : raw)); };

    const itemsDiv = document.getElementById('items');
    let PRODUCTS = [];
    let productCounter = 0; 
    const FIXED_IDS = ['b8','b9','b9b','b10','b11','b12','discount']; // Substituído divide2 por discount
    const PERSIST_KEY = 'precificador';
    
    // Rastreamento para cálculo bidirecional
    let ultimoCampoAlterado = ''; // 'margem', 'anuncio', ou ''

    function createProductRow(index, costValue = '', qtyValue = 1, pesoValue = 0, isVisible = false) {
      productCounter = index; 
      const bId = 'b' + index;
      const cId = 'c' + index;
      const pesoId = 'peso' + index;

      // Linha com labels
      const wrapLabel = document.createElement('div');
      wrapLabel.className = 'row4 product-label';
      wrapLabel.id = 'product-label-' + index;
      wrapLabel.style.display = isVisible ? 'grid' : 'none';
      wrapLabel.innerHTML = `
        <div>PRODUTO ${index}</div>
        <div>QTD</div>
        <div>PESO (kg)</div>
      `;
      itemsDiv.appendChild(wrapLabel);

      // Linha com inputs
      const wrapInputs = document.createElement('div');
      wrapInputs.className = 'row4 product-inputs';
      wrapInputs.id = 'product-row-' + index;
      wrapInputs.style.display = isVisible ? 'grid' : 'none';
      
      let innerHtml = `
        <input class="money" type="number" inputmode="decimal" step="0.01" id="${bId}" placeholder="Valor" value="${costValue}">
        <input class="qty" type="number" inputmode="numeric" pattern="[0-9]*" step="1" id="${cId}" value="${qtyValue}">
        <input class="peso" type="number" inputmode="decimal" step="0.01" id="${pesoId}" placeholder="kg" value="${pesoValue}">
      `;

      wrapInputs.innerHTML = innerHtml;
      itemsDiv.appendChild(wrapInputs);
      
      PRODUCTS.push({ bId, cId, pesoId });

      const costInput = document.getElementById(bId);
      const qtyInput = document.getElementById(cId);
      const pesoInput = document.getElementById(pesoId);

      costInput.addEventListener('input', handleProductInput, { passive:true });
      qtyInput.addEventListener('input', handleProductChange, { passive:true });
      pesoInput.addEventListener('input', handleProductChange, { passive:true });

      return costInput.parentElement;
    }
    
    function handleProductChange(e) {
      // Quando qty ou peso muda, recalcular
      // Se estamos em modo "anuncio" (valor anuncio foi digitado), recalcular margem também
      calc();
      
      // Atualizar peso cúbico se em Mercado Livre
      if (MARKETPLACE_ESTADO.selecionado === 'mercadolivre') {
        atualizarPesoCubico();
      }
      
      if (ultimoCampoAlterado === 'anuncio') {
        // Dar um pequeno delay para calc() processar antes de calcReverso()
        setTimeout(() => {
          calcReverso();
        }, 10);
      }
    }

    function handleProductInput(e) {
      calc(); 

      const currentInput = e.target;
      const currentIndex = parseInt(currentInput.id.replace('b', ''));
      const currentValue = val(currentInput.id); 

      if (currentValue > 0 && currentIndex === PRODUCTS.length) {
          const nextIndex = productCounter + 1;
          createProductRow(nextIndex, '', 1, 0, true);
          // Ajustar visibilidade do peso para a nova linha criada
          atualizarRowsComPeso();
      }
      
      if (currentValue === 0) {
          for (let i = PRODUCTS.length; i > currentIndex; i--) {
              const product = PRODUCTS[i - 1];
              if (val(product.bId) === 0) {
                  const row = document.getElementById('product-row-' + i);
                  itemsDiv.removeChild(row);
                  PRODUCTS.pop(); 
                  productCounter--;
              } else {
                  break;
              }
          }
      }
      
      saveData();
    }
    
    function resetProducts() {
        itemsDiv.innerHTML = '';
        PRODUCTS = [];
        productCounter = 0;
        
        createProductRow(1, '', 1, 0, true);
        
        calc(); 
    }
    
    // NOVO: Função para zerar apenas as taxas (porcentagens e valores fixos)
    function resetTaxes() {
        // Limpa todos os campos de taxas
        document.getElementById('b8').value = '';  // Margem Lucro
        document.getElementById('b9').value = '';  // Custo Fixo/Frete
        document.getElementById('b9b').value = ''; // Embalagem
        document.getElementById('b10').value = ''; // Imposto
        document.getElementById('b11').value = ''; // Taxa Extra
        document.getElementById('b12').value = ''; // Comissão
        
        // Recalcula tudo
        calc();
    }
    
    FIXED_IDS.forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.addEventListener('input', function() {
          if (id === 'b8') ultimoCampoAlterado = 'margem';
          // Guardar b12 no marketplace atual
          if (id === 'b12') {
            MARKETPLACE_ESTADO.b12_valores[MARKETPLACE_ESTADO.selecionado] = el.value;
          }
          calc();
        }, { passive:true });
      }
    });
    
    // Helper para formatar valor com 2 casas decimais
    
    // ===== PESO CÚBICO PARA MERCADO LIVRE =====
    function atualizarPesoCubico() {
      const altura = parseFloat(document.getElementById('ml-altura').value) || 0;
      const largura = parseFloat(document.getElementById('ml-largura').value) || 0;
      const comprimento = parseFloat(document.getElementById('ml-comprimento').value) || 0;
      
      // Calcular peso cúbico: (altura × largura × comprimento) / 6000
      const pesoCubico = (altura * largura * comprimento) / 6000;
      
      // Somar peso dos produtos
      let pesoReal = 0;
      PRODUCTS.forEach(product => {
        const peso = parseFloat(document.getElementById(product.pesoId).value) || 0;
        const qty = parseFloat(document.getElementById(product.cId).value) || 0;
        pesoReal += peso * qty;
      });
      
      // Usar o MAIOR entre peso real e peso cúbico
      const pesoUsado = Math.max(pesoReal, pesoCubico);
      
      // Atualizar displays
      document.getElementById('ml-peso-real').textContent = pesoReal.toFixed(3) + ' kg';
      document.getElementById('ml-peso-cubico').textContent = pesoCubico.toFixed(3) + ' kg';
      document.getElementById('ml-peso-usado').textContent = pesoUsado.toFixed(3) + ' kg';
      
      // Armazenar peso cúbico para usar em cálculos
      window.ML_PESO_USADO = pesoUsado;
      
      // Recalcular se estamos em Mercado Livre
      if (MARKETPLACE_ESTADO.selecionado === 'mercadolivre') {
        calc();
      }
    }
    
    // Adicionar listeners aos campos de dimensão
    const mlAltura = document.getElementById('ml-altura');
    const mlLargura = document.getElementById('ml-largura');
    const mlComprimento = document.getElementById('ml-comprimento');
    
    if (mlAltura) mlAltura.addEventListener('input', atualizarPesoCubico, { passive: true });
    if (mlLargura) mlLargura.addEventListener('input', atualizarPesoCubico, { passive: true });
    if (mlComprimento) mlComprimento.addEventListener('input', atualizarPesoCubico, { passive: true });
    
    // Listener especial para VALOR ANÚNCIO (cálculo reverso)
    const b13Input = document.getElementById('b13');
    if (b13Input) {
      b13Input.addEventListener('input', function() {
        let numValue = parseFloat(this.value.replace(',', '.')) || 0;
        // Só fazer cálculo reverso se o valor é maior que 0
        if (numValue > 0) {
          ultimoCampoAlterado = 'anuncio';
          calcReverso();
        }
      }, { passive:true });
    }

    function calc(){
      let soma = 0;
      PRODUCTS.forEach(product => {
        const bi = val(product.bId);
        const ci = parseFloat(document.getElementById(product.cId).value) || 0;
        soma += bi * ci;
      });
      
      // Aplica o desconto percentual ao custo total
      const discountPct = pct('discount'); // Desconto como fração (0-1)
      const b7 = soma * (1 - discountPct); // Aplica o desconto

      const b8 = pct('b8'), b10 = pct('b10'), b11 = pct('b11'), b12 = pct('b12');
      const b9 = val('b9');
      const b9b = val('b9b'); // Novo campo de embalagem

      const somaPct = b8 + b10 + b11 + b12;
      const denom = 1 - somaPct;
      document.getElementById('warn').style.display = (denom <= 0) ? 'block' : 'none';

      // Agora soma frete (b9) + embalagem (b9b) ao custo total
      const b13 = denom <= 0 ? 0 : (b7 + b9 + b9b) / denom;

      const margemR   = b13 * b8;
      const impostoR  = b13 * b10;
      const fixoR     = b13 * b11;
      const comissaoR = b13 * b12;

      document.getElementById('b7').textContent  = brl(b7);
      document.getElementById('b13').value = b13.toFixed(2);

      document.getElementById('r_b8').textContent  = brl(margemR);
      document.getElementById('r_b10').textContent = brl(impostoR);
      document.getElementById('r_b11').textContent = brl(fixoR);
      document.getElementById('r_b12').textContent = brl(comissaoR);

      saveData();
    }

    function calcReverso() {
      // Modo reverso: usuário digita VALOR ANÚNCIO, sistema calcula MARGEM LUCRO
      let soma = 0;
      PRODUCTS.forEach(product => {
        const bi = val(product.bId);
        const ci = parseFloat(document.getElementById(product.cId).value) || 0;
        soma += bi * ci;
      });
      
      const discountPct = pct('discount');
      const b7 = soma * (1 - discountPct);
      const b13 = val('b13'); // Valor digitado pelo usuário
      const b9 = val('b9');
      const b9b = val('b9b');
      const b10 = pct('b10'), b11 = pct('b11'), b12 = pct('b12');

      // Para marketplace progressivo, precisa encontrar o custo fixo e taxa percentual baseado no preço digitado
      let custoFixoAdicional = 0;
      let taxaPercentualAdicional = 0; // Para Shopee
      const marketplace = MARKETPLACE_ESTADO.selecionado;
      if ((marketplace === 'shopee' || marketplace === 'mercadolivre') && b13 > 0) {
        const faixa = obterFaixaAplicavel(b13, marketplace);
        if (faixa) {
          if (marketplace === 'mercadolivre') {
            custoFixoAdicional = faixa.custoFixoValor || 0;
          } else if (marketplace === 'shopee') {
            taxaPercentualAdicional = (faixa.percentual / 100) || 0;
            custoFixoAdicional = faixa.fixo || 0;
          }
        }
      }

      // Fórmula reversa para calcular margem
      // b13 = (b7 + b9 + b9b + custoFixo + b8*b13) / (1 - shopeePercentual - b10 - b11 - b12)
      // ou para Mercado Livre (sem shopeePercentual):
      // b13 = (b7 + b9 + b9b + custoFixo + b8*b13) / (1 - b10 - b11 - b12)
      
      let b8Calculado = 0;
      if (b13 > 0) {
        const somaPctOtros = taxaPercentualAdicional + b10 + b11 + b12;
        b8Calculado = ((b13 * (1 - somaPctOtros)) - (b7 + b9 + b9b + custoFixoAdicional)) / b13;
        
        // Garantir que margem não seja negativa
        if (b8Calculado < 0) b8Calculado = 0;
      }
      
      // b8Calculado está em decimal (0,15 para 15%), converter para percentual (15)
      const b8Percentual = b8Calculado * 100;
      
      // Atualizar o campo de margem (sempre 2 casas decimais)
      document.getElementById('b8').value = b8Percentual.toFixed(2);
      
      // Apenas atualizar os valores exibidos em reais, SEM recalcular b13
      atualizarValoresExibidos();
      
      saveData();
    }
    
    function atualizarValoresExibidos() {
      // Atualiza apenas os valores exibidos (em reais) sem recalcular b13
      const b8 = pct('b8'), b10 = pct('b10'), b11 = pct('b11'), b12 = pct('b12');
      const b13 = val('b13');
      
      const margemR   = b13 * b8;
      const impostoR  = b13 * b10;
      const fixoR     = b13 * b11;
      const comissaoR = b13 * b12;

      document.getElementById('r_b8').textContent  = brl(margemR);
      document.getElementById('r_b10').textContent = brl(impostoR);
      document.getElementById('r_b11').textContent = brl(fixoR);
      document.getElementById('r_b12').textContent = brl(comissaoR);
    }

    function restoreData() {
        const saved = localStorage.getItem(PERSIST_KEY);
        if (!saved) {
            createProductRow(1, '', 1, 0, true);
            return false;
        }
        
        const data = JSON.parse(saved);
        
        // Restaurar b12_valores (valores separados por marketplace)
        if (data.b12_valores) {
            MARKETPLACE_ESTADO.b12_valores = data.b12_valores;
        }
        
        // Restaurar marketplace selecionado
        if (data.marketplace) {
            MARKETPLACE_ESTADO.selecionado = data.marketplace;
            const marketplaceSelect = document.getElementById('marketplaceSelect');
            if (marketplaceSelect) {
                marketplaceSelect.value = data.marketplace;
                // Disparar evento change para atualizar a UI (mostrar/esconder botões, etc)
                marketplaceSelect.dispatchEvent(new Event('change'));
            }
        }
        
        // PRIMEIRO: Restaurar campos fixos (taxas) ANTES de criar produtos
        if (data.fixed) {
            Object.entries(data.fixed).forEach(([k, v]) => {
                const el = document.getElementById(k);
                if (!el) return;
                
                // Para Mercado Livre: sempre restaurar b12, mas nunca restaurar b9
                if (data.marketplace === 'mercadolivre') {
                    if (k === 'b9') {
                        return; // Não restaurar b9 em Mercado Livre
                    }
                }
                
                el.value = v;
            });
        }
        
        if (data.b13) {
            document.getElementById('b13').value = parseFloat(data.b13).toFixed(2);
        }
        
        // DEPOIS: Restaurar produtos
        if (data.products && data.products.length > 0) {
            itemsDiv.innerHTML = '';
            PRODUCTS = [];
            
            data.products.forEach((p, index) => {
                const productIndex = index + 1;
                const pesoValue = p.peso !== undefined && p.peso !== '' ? p.peso : 0;
                const isVisible = true;
                createProductRow(productIndex, p.cost, p.qty, pesoValue, isVisible);
            });
            
            const ultimoIndex = data.products.length;
            createProductRow(ultimoIndex + 1, '', 1, 0, true);
        } else {
            createProductRow(1, '', 1, 0, true);
        }
        
        // Restaurar dimensões do Mercado Livre
        if (data.ml_dimensions) {
            if (data.ml_dimensions.altura) {
                document.getElementById('ml-altura').value = data.ml_dimensions.altura;
            }
            if (data.ml_dimensions.largura) {
                document.getElementById('ml-largura').value = data.ml_dimensions.largura;
            }
            if (data.ml_dimensions.comprimento) {
                document.getElementById('ml-comprimento').value = data.ml_dimensions.comprimento;
            }
            // Atualizar cálculo do peso cúbico com as dimensões restauradas
            setTimeout(() => atualizarPesoCubico(), 100);
        }
        
        return true;
    }

      if (MARKETPLACES_CONFIG.shopee.faixas.length > 1) {
        MARKETPLACES_CONFIG.shopee.faixas.splice(idx, 1);
        renderizarFaixas();
        saveData();
        calc();
      }
    }

    function adicionarFaixaMercadoLivre() {
      const faixas = MARKETPLACES_CONFIG.mercadolivre.faixas;
      const ultimaFaixa = faixas[faixas.length - 1];
      const novaFaixa = {
        precoAte: (ultimaFaixa.precoAte === Infinity ? 300 : ultimaFaixa.precoAte + 50),
        custoFixoValor: 0
      };
      faixas.push(novaFaixa);
      renderizarFaixas();
      saveData();
    }

    function removerFaixaMercadoLivre(idx) {
      if (MARKETPLACES_CONFIG.mercadolivre.faixas.length > 1) {
        MARKETPLACES_CONFIG.mercadolivre.faixas.splice(idx, 1);
        renderizarFaixas();
        saveData();
        calc();
      }
    }

    // Função auxiliar para obter faixa aplicável
    function obterFaixaAplicavel(precoFinal, marketplace) {
      const config = MARKETPLACES_CONFIG[marketplace];
      if (!config) return null;
      
      if (marketplace === 'mercadolivre') {
        // Usar peso cúbico (já calculado em atualizarPesoCubico)
        let pesoFaixa = 0;
        const pesoAUsar = window.ML_PESO_USADO || 0;
        
        for (let i = 0; i < config.faixasPeso.length; i++) {
          if (pesoAUsar <= config.faixasPeso[i].pesoAte) {
            pesoFaixa = i;
            break;
          }
        }
        
        // Depois encontra a faixa de preço
        let precoFaixa = 0;
        for (let i = 0; i < config.faixasPreco.length; i++) {
          if (precoFinal <= config.faixasPreco[i].precoAte) {
            precoFaixa = i;
            break;
          }
        }
        
        return {
          peso: config.faixasPeso[pesoFaixa],
          preco: config.faixasPreco[precoFaixa],
          custoFixoValor: config.tabela[pesoFaixa][precoFaixa]
        };
      }
      
      // Para Shopee
      for (let faixa of config.faixas) {
        if (precoFinal <= faixa.precoAte) {
          return faixa;
        }
      }
      return config.faixas[config.faixas.length - 1];
    }

    // Modificar a função de cálculo para suportar marketplaces progressivos
    // Override da função calc() para usar Marketplace Config
    const calcOriginal = calc;
    window.calcWithMarketplace = function() {
      let soma = 0;
      PRODUCTS.forEach(product => {
        const bi = val(product.bId);
        const ci = parseFloat(document.getElementById(product.cId).value) || 0;
        soma += bi * ci;
      });
      
      const discountPct = pct('discount');
      const b7 = soma * (1 - discountPct);

      const b8 = pct('b8'), b10 = pct('b10'), b11 = pct('b11'), b12 = pct('b12');
      const b9 = val('b9');
      const b9b = val('b9b');

      // Se está usando um marketplace progressivo, usar cálculo iterativo
      const marketplace = MARKETPLACE_ESTADO.selecionado;
      if (marketplace === 'shopee' || marketplace === 'mercadolivre') {
        let precoFinal;
        
        // Se o usuário mudou a MARGEM LUCRO, recalcular b13
        // Se o usuário mudou o VALOR ANÚNCIO, manter b13 que já foi digitado
        if (ultimoCampoAlterado === 'margem' || ultimoCampoAlterado === '') {
          precoFinal = calcularPrecoProgressivo(b7, b9, b9b, b8, b10, b11, b12, marketplace);
          document.getElementById('b13').value = precoFinal.toFixed(2);
          ultimoCampoAlterado = ''; // Resetar após processar
        } else if (ultimoCampoAlterado === 'anuncio') {
          // Usuário digitou valor anúncio, manter ele como está
          precoFinal = val('b13');
        }

        document.getElementById('b7').textContent  = brl(b7);

        // Calcular taxas de acordo com a faixa
        const faixa = obterFaixaAplicavel(precoFinal, marketplace);
        let margemLiquidaTotal = 0;
        
        if (marketplace === 'shopee' && faixa) {
          const comissaoR = precoFinal * (faixa.percentual / 100) + faixa.fixo;
          const impostoR = precoFinal * b10;
          const extraR = precoFinal * b11;
          const lucroR = b8 > 0 ? (precoFinal * b8) : 0;
          margemLiquidaTotal = precoFinal - b7 - b9 - b9b - comissaoR - impostoR - extraR - lucroR;
          
          document.getElementById('r_b8').textContent = brl(lucroR || 0);
          document.getElementById('r_b10').textContent = brl(impostoR);
          document.getElementById('r_b11').textContent = brl(extraR);
          document.getElementById('r_b12').textContent = brl(comissaoR);
        } else if (marketplace === 'mercadolivre' && faixa) {
          const custoFixoR = faixa.custoFixoValor || 0;
          const impostoR = precoFinal * b10;
          const comissaoR = precoFinal * b12;
          const extraR = precoFinal * b11;
          const lucroR = b8 > 0 ? (precoFinal * b8) : 0;
          margemLiquidaTotal = precoFinal - b7 - b9 - b9b - custoFixoR - impostoR - comissaoR - extraR - lucroR;
          
          document.getElementById('r_b8').textContent = brl(lucroR || 0);
          document.getElementById('r_b10').textContent = brl(impostoR);
          document.getElementById('r_b11').textContent = brl(extraR);
          document.getElementById('r_b12').textContent = brl(comissaoR + custoFixoR);
        }

        document.getElementById('warn').style.display = 'none';
        saveData(); // Salvar dados após cálculo
      } else {
        // Usar cálculo original para uso genérico
        calcOriginal.call(this);
      }
    };

    function calcularPrecoProgressivo(custoBase, frete, embalagem, margem, imposto, extra, comissao, marketplace) {
      // Cálculo iterativo para encontrar o preço final
      let precoFinal = custoBase * 1.3; // Palpite inicial
      let precision = 0.01;
      let maxIter = 100;

      for (let i = 0; i < maxIter; i++) {
        const faixa = obterFaixaAplicavel(precoFinal, marketplace);
        if (!faixa) {
          return precoFinal;
        }

        let taxasPercentuais = 0;
        let taxasFixas = 0;

        if (marketplace === 'shopee') {
          taxasPercentuais = (faixa.percentual / 100) + imposto + extra + comissao + margem;
          taxasFixas = faixa.fixo;
        } else if (marketplace === 'mercadolivre') {
          taxasPercentuais = imposto + extra + comissao + margem;
          taxasFixas = faixa.custoFixoValor || 0;
        }

        const novoPreco = (custoBase + frete + embalagem + taxasFixas) / (1 - taxasPercentuais);
        
        if (Math.abs(novoPreco - precoFinal) < precision) {
          return novoPreco;
        }
        precoFinal = novoPreco;
      }

      return precoFinal;
    }

    // Sobrescrever função calc com versão marketplace
    const originalCalc = calc;
    calc = function() {
      if (MARKETPLACE_ESTADO.selecionado === 'shopee' || MARKETPLACE_ESTADO.selecionado === 'mercadolivre') {
        calcWithMarketplace();
      } else {
        originalCalc.call(this);
      }
    };

    // Restaurar dados de marketplace
    function restoreMarketplaceData() {
      const saved = localStorage.getItem(PERSIST_KEY);
      if (saved) {
        try {
          const data = JSON.parse(saved);
          
          // Restaurar b12_valores
          if (data.b12_valores) {
            MARKETPLACE_ESTADO.b12_valores = data.b12_valores;
          }
          
          if (data.marketplace) {
            MARKETPLACE_ESTADO.selecionado = data.marketplace;
            document.getElementById('marketplaceSelect').value = data.marketplace;
            
            const configBtn = document.getElementById('marketplaceConfigBtn');
            const taxFixoWrapper = document.getElementById('tax-fixo-wrapper');
            const taxComissaoWrapper = document.getElementById('tax-comissao-wrapper');
            
            if (data.marketplace === 'shopee') {
              configBtn.style.display = 'block';
              taxFixoWrapper.style.display = 'none';
              taxComissaoWrapper.style.display = 'none';
            } else if (data.marketplace === 'mercadolivre') {
              configBtn.style.display = 'none';
              taxFixoWrapper.style.display = 'none';
              taxComissaoWrapper.style.display = 'grid';
            } else {
              configBtn.style.display = 'none';
              taxFixoWrapper.style.display = 'grid';
              taxComissaoWrapper.style.display = 'grid';
            }
          }
          // APENAS Shopee é editável - restaurar suas faixas
          if (data.shopeeConfig) {
            MARKETPLACES_CONFIG.shopee = data.shopeeConfig;
          }
        } catch (e) {
          console.error('Erro ao restaurar dados de marketplace:', e);
        }
      }
    }

    // Restaurar tudo na sequência correta
    restoreMarketplaceData();  // PRIMEIRO: restaura marketplace selecionado
    const temDadosSalvos = restoreData();  // SEGUNDO: cria linhas de produto e restaura taxas
    
    // Restaurar b12 de acordo com o marketplace
    if (MARKETPLACE_ESTADO.b12_valores[MARKETPLACE_ESTADO.selecionado]) {
      document.getElementById('b12').value = MARKETPLACE_ESTADO.b12_valores[MARKETPLACE_ESTADO.selecionado];
    }
    
    atualizarRowsComPeso();    // TERCEIRO: ajusta campos peso
    
    // Chamar calc() se há dados salvos para recalcular valores em R$
    if (temDadosSalvos) {
      calc();
    }
    
    // ===== TEMA LIGHT/DARK MODE =====
    function toggleTheme() {
      const body = document.body;
      const btn = document.getElementById('themeToggleBtn');
      
      if (body.classList.contains('light-mode')) {
        // Mudar para dark mode
        body.classList.remove('light-mode');
        btn.textContent = '🌙 Dark Mode';
        localStorage.setItem('theme', 'dark');
      } else {
        // Mudar para light mode
        body.classList.add('light-mode');
        btn.textContent = '☀️ Light Mode';
        localStorage.setItem('theme', 'light');
      }
    }
    
    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      const btn = document.getElementById('themeToggleBtn');
      
      if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
        btn.textContent = '☀️ Light Mode';
      } else {
        // Default: dark mode
        document.body.classList.remove('light-mode');
        btn.textContent = '🌙 Dark Mode';
      }
    }
    
    // Inicializar tema ao carregar
    initTheme();

    // Service Worker desabilitado para teste local com file://

  </script>
